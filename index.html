<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Pengumuman Kelulusan - SMP Negeri 3 Pekanbaru</title>
  <style>
    /* Reset & Struktur Dasar */
    * { box-sizing: border-box; }
    
    html, body {
      height: 100%;
      margin: 0;
      padding: 0;
    }

    body {
      display: flex;
      flex-direction: column;
      font-family: 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
      background: #f0f4f8;
      color: #333;
    }

    /* Header */
    header {
      background: #1d4ed8;
      color: white;
      padding: 20px 10px;
      text-align: center;
      flex-shrink: 0;
    }

    header img {
      height: 70px;
      width: auto;
      margin-bottom: 10px;
    }

    header h1 { font-size: 1.4rem; margin: 5px 0; }
    header h2 { font-size: 1rem; font-weight: normal; margin: 0; }

    /* Konten Utama */
    main {
      flex: 1 0 auto; /* Mendorong footer ke bawah */
      display: flex;
      justify-content: center; /* Tengah horizontal */
      align-items: flex-start; /* Mulai dari atas */
      padding: 30px 15px;
    }

    /* Kotak Putih Tengah */
    .container {
      background: white;
      width: 100%;
      max-width: 450px; /* Batas lebar di komputer */
      padding: 25px;
      border-radius: 12px;
      box-shadow: 0 4px 15px rgba(0,0,0,0.05);
      text-align: center;
    }

    .container p {
      margin-bottom: 20px;
      color: #64748b;
    }

    /* Input & Tombol */
    input[type="text"] {
      width: 100%;
      padding: 12px;
      font-size: 16px;
      border: 2px solid #e2e8f0;
      border-radius: 8px;
      margin-bottom: 15px;
      text-align: center;
      outline: none;
    }

    input[type="text"]:focus {
      border-color: #2563eb;
    }

    button {
      width: 100%;
      padding: 12px;
      font-size: 16px;
      background-color: #2563eb;
      color: white;
      border: none;
      border-radius: 8px;
      cursor: pointer;
      font-weight: bold;
      transition: 0.3s;
    }

    button:hover { background-color: #1e40af; }

    /* Hasil */
    .result {
      margin-top: 25px;
      padding-top: 20px;
      border-top: 1px solid #f1f5f9;
      font-size: 16px;
      line-height: 1.6;
    }

    .lulus {
      color: #059669;
      font-weight: bold;
      font-size: 1.1rem;
      animation: blink 1s infinite;
      margin-top: 10px;
    }

    .tidaklulus {
      color: #dc2626;
      font-weight: bold;
      margin-top: 10px;
    }

    /* Footer */
    footer {
      background: white;
      text-align: center;
      padding: 15px;
      font-size: 12px;
      color: #94a3b8;
      border-top: 1px solid #e2e8f0;
      flex-shrink: 0;
    }

    @keyframes blink {
      0%, 100% { opacity: 1 }
      50% { opacity: 0.5 }
    }

    /* Penyesuaian HP */
    @media (max-width: 480px) {
      header h1 { font-size: 1.1rem; }
      header h2 { font-size: 0.9rem; }
      .container { padding: 20px; }
    }
  </style>
</head>
<body>

  <header>
    <img src="https://raw.githubusercontent.com/efendibinselim/PENGUMUMAN-KELULUSAN/refs/heads/main/logosmpn3pku%20png.png" alt="Logo Sekolah">
    <h1>Pengumuman Kelulusan</h1>
    <h2>SMP Negeri 3 Pekanbaru<br>Tahun Pelajaran 2025/2026</h2>
  </header>

  <main>
    <div class="container">
      <p>Masukkan NISN untuk melihat hasil:</p>
      <input type="text" id="nisnInput" placeholder="Contoh: 0098765432">
      <button onclick="cekKelulusan()">Cek Kelulusan</button>
      <div class="result" id="hasil"></div>
    </div>
  </main>

  <footer>
    &copy; 2026 SMP Negeri 3 Pekanbaru<br>Jl. Dahlia No. 102
  </footer>

  <script>
    const sheetURL = "https://docs.google.com/spreadsheets/d/e/2PACX-1vTlOAf-YkKZAjTd7dpK49JinaQyppe3GWonVcKqewsJxboPYAOkqT2QG9-HOgx8hDs0DItwRHCA6w24/pub?output=csv";
    let dataSiswa = [];

    fetch(sheetURL)
      .then(res => res.text())
      .then(csv => {
        const rows = csv.split('\n').slice(1);
        dataSiswa = rows.map(row => {
          const cols = row.split(',');
          return {
            nisn: cols[1]?.trim(),
            nama: cols[2],
            tempat: cols[3],
            tanggal: cols[4],
            status: cols[5]?.trim()
          };
        });
      });

    function cekKelulusan() {
      const input = document.getElementById("nisnInput").value.trim();
      const hasil = document.getElementById("hasil");
      if (input === "") {
        hasil.innerHTML = "Silakan masukkan NISN.";
        return;
      }
      const siswa = dataSiswa.find(d => d.nisn === input);
      if (siswa) {
        let content = `<p>Nama: <strong>${siswa.nama}</strong><br>TTL: ${siswa.tempat}, ${siswa.tanggal}</p>`;
        if (siswa.status.toUpperCase() === "LULUS") {
          content += `<div class="lulus">🎉 SELAMAT! ANDA LULUS 🎉</div>`;
          showConfetti();
        } else {
          content += `<div class="tidaklulus">MOHON MAAF, ANDA BELUM LULUS.</div>`;
        }
        hasil.innerHTML = content;
      } else {
        hasil.innerHTML = "NISN tidak ditemukan.";
      }
    }

    function showConfetti() {
      const duration = 2 * 1000;
      const animationEnd = Date.now() + duration;
      const interval = setInterval(function() {
        if (Date.now() > animationEnd) return clearInterval(interval);
        confetti({
          particleCount: 50,
          origin: { x: Math.random(), y: Math.random() - 0.2 }
        });
      }, 250);
    }
  </script>
  <script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.6.0/dist/confetti.browser.min.js"></script>
</body>
</html>
